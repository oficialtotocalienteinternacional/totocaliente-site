<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOTO CALIENTE INTERNACIONAL</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:40px;
  position:relative;
}

.logo{
  font-size:40px;
  font-weight:bold;
  margin-bottom:20px;
}

.btn{
  display:inline-block;
  padding:15px 30px;
  background:#28a745;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-size:20px;
  margin-top:20px;
  transition:background 0.3s;
}
.btn:hover{
  background:#218838;
}

.card{
  background:#222;
  padding:20px;
  margin:20px auto;
  max-width:700px;
  border-radius:10px;
}

input[type="email"]{
  padding:10px;
  border-radius:5px;
  border:none;
  width:60%;
  margin-top:10px;
}

footer{
  margin-top:40px;
  font-size:14px;
  color:#aaa;
}

/* Logo sticky en la esquina */
.logo-esquina{
  position:fixed;   /* se queda fijo aunque hagas scroll */
  top:20px;
  left:20px;        /* cámbialo a right:20px si lo quieres a la derecha */
  width:100px;      /* ajusta el tamaño según necesites */
  z-index:1000;     /* asegura que quede por encima del contenido */
}
</style>
</head>

<body>

<!-- Logo sticky en la esquina -->
<img src="tu-logo.png" alt="Logo TOTO CALIENTE INTERNACIONAL" class="logo-esquina">

<div class="logo">
🔥 TOTO CALIENTE INTERNACIONAL 🔥
</div>
