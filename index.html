<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
/* Variables CSS para facilitar la personalización de colores */
:root {
--color-fondo-principal: #0a0a0a;
--color-fondo-secundario: #1a1a1a;
--color-primario: #ff4500; /* Naranja Caliente */
--color-texto-claro: #ffffff;
--color-texto-gris: #cccccc;
--color-borde-card: #333333;
--color-exito: #4caf50; /* Verde para Online/Éxito */
--color-telegram: #0088cc; /* Azul Telegram */
}

/* Reset básico y configuración de fuente global */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Montserrat', sans-serif;
background: var(--color-fondo-principal);
/* Gradiente radial sutil para profundidad */
background-image: radial-gradient(circle at top right, rgba(42, 16, 5, 0.3), transparent 40%),
radial-gradient(circle at bottom left, rgba(0, 0, 0, 0.3), transparent 50%);
color: var(--color-texto-claro);
line-height: 1.6;
scroll-behavior: smooth; /* Desplazamiento suave para anclas */
}

/* Contenedor principal para centrar el contenido */
.container {
max-width: 1200px;
margin: 0 auto;
padding: 20px;
}

/* Estilos para el encabezado (Header) */
header {
background: var(--color-fondo-secundario);
padding: 20px 0;
border-bottom: 1px solid var(--color-borde-card);
text-align: center;
}

.header-content {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 15px;
}

.header-logo {
width: 80px; /* Tamaño del logo */
height: 80px;
object-fit: contain;
border-radius: 50%; /* Si quieres un logo circular */
border: 2px solid var(--color-primario);
padding: 5px;
}

.header-text h1 {
font-size: clamp(28px, 6vw, 48px);
color: var(--color-primario);
margin-bottom: 5px;
font-weight: 900;
letter-spacing: 1px;
}

.header-text p {
font-size: clamp(14px, 2.5vw, 18px);
color: var(--color-texto-gris);
font-weight: 300;
}

/* Estilos generales de sección */
section {
padding: 60px 0;
border-bottom: 1px solid var(--color-borde-card);
}

section:last-of-type {
border-bottom: none;
}

.section-title {
text-align: center;
font-size: clamp(28px, 5vw, 42px);
color: var(--color-primario);
margin-bottom: 40px;
font-weight: 900;
position: relative;
padding-bottom: 15px;
}

.section-title::after {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 80px;
height: 4px;
background: var(--color-primario);
border-radius: 2px;
}

/* Estilos para cards (tarjetas) en todas las secciones */
.card {
background: var(--color-fondo-secundario);
border-radius: 12px;
padding: 30px;
margin-bottom: 25px;
box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
transition: transform 0.3s ease, box-shadow 0.3s ease;
border-left: 5px solid var(--color-primario); /* Borde distintivo */
}

.card:hover {
transform: translateY(-5px);
box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
}

.card h3 {
color: var(--color-primario);
margin-bottom: 15px;
font-size: 24px;
display: flex;
align-items: center;
gap: 10px;
}

.card p {
color: var(--color-texto-gris);
margin-bottom: 15px;
}

/* Estilos para botones generales */
.btn {
display: inline-flex; /* Permite alinear icono y texto */
align-items: center;
gap: 8px;
padding: 14px 28px;
background: var(--color-telegram); /* Color por defecto, puede ser sobrescrito */
color: var(--color-texto-claro);
text-decoration: none;
border-radius: 50px;
font-weight: bold;
font-size: 16px;
transition: background-color 0.3s ease, transform 0.2s ease;
white-space: nowrap; /* Evita que el texto se rompa */
}

.btn:hover {
background-color: var(--color-primario);
transform: translateY(-2px);
}

.btn.btn-primary {
background: var(--color-primario);
}

.btn.btn-primary:hover {
background: #e03e00; /* Un tono más oscuro */
}

.btn.btn-telegram {
background: var(--color-telegram);
}

.btn.btn-telegram:hover {
background: #0077b3;
}

/* Hero Section */
#hero {
text-align: center;
padding: 80px 20px;
background: linear-gradient(135deg, rgba(15, 15, 15, 0.95), rgba(26, 26, 26, 0.95));
border-bottom: none;
}

#hero h2 {
font-size: clamp(36px, 7vw, 60px);
color: var(--color-primario);
margin-bottom: 20px;
font-weight: 900;
text-shadow: 0 0 15px rgba(255, 69, 0, 0.5);
}

#hero p {
font-size: clamp(18px, 3vw, 24px);
color: var(--color-texto-gris);
max-width: 800px;
margin: 0 auto 40px auto;
font-weight: 300;
}

/* About Us Section */
#about .about-content {
display: flex;
flex-direction: column;
gap: 25px;
align-items: center;
}

#about .about-content p {
max-width: 900px;
text-align: center;
font-size: 18px;
color: var(--color-texto-gris);
}

/* News Section */
#news .news-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 30px;
}

.news-item {
background: var(--color-fondo-secundario);
border-radius: 12px;
padding: 25px;
box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
border-left: 4px solid var(--color-texto-gris);
}

.news-item h4 {
color: var(--color-primario);
margin-bottom: 10px;
font-size: 20px;
display: flex;
align-items: center;
gap: 8px;
}
.news-item .date {
font-size: 14px;
color: #888;
margin-top: 10px;
display: block;
}

/* Featured Posts (Publicaciones Destacadas) Section */
#featured-posts .post-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 30px;
}

.post-card {
background: var(--color-fondo-secundario);
border-radius: 12px;
padding: 25px;
box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
border-left: 4px solid var(--color-primario);
display: flex;
flex-direction: column;
justify-content: space-between; /* Empuja el botón hacia abajo */
}

.post-card h4 {
color: var(--color-primario);
margin-bottom: 10px;
font-size: 22px;
display: flex;
align-items: center;
gap: 8px;
}

.post-card p {
color: var(--color-texto-gris);
margin-bottom: 20px;
flex-grow: 1; /* Permite que el párrafo ocupe espacio y empuje el botón */
}

.post-card .btn {
width: fit-content; /* El botón solo ocupa el ancho de su contenido */
margin-top: auto; /* Empuja el botón al final de la tarjeta */
}

/* Official Links Section */
#official-links .links-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 25px;
}

.link-card {
background: var(--color-fondo-secundario);
border-radius: 12px;
padding: 20px;
text-align: center;
box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
border: 1px solid var(--color-borde-card);
transition: border-color 0.3s ease;
}

.link-card:hover {
border-color: var(--color-primario);
}

.link-card h4 {
color: var(--color-texto-claro);
margin-bottom: 15px;
font-size: 20px;
}

.link-card .btn {
width: 100%;
justify-content: center; /* Centra el contenido del botón */
}

/* Main Channel CTA (Call To Action) */
#main-channel {
text-align: center;
padding: 60px 20px;
background: linear-gradient(45deg, rgba(255, 69, 0, 0.1), rgba(0, 0, 0, 0.8));
border-radius: 15px;
margin-top: 40px;
border: 2px dashed var(--color-primario);
}

#main-channel h2 {
font-size: clamp(28px, 5vw, 40px);
color: var(--color-primario);
margin-bottom: 25px;
font-weight: 900;
}

#main-channel p {
font-size: 18px;
color: var(--color-texto-gris);
margin-bottom: 30px;
max-width: 700px;
margin-left: auto;
margin-right: auto;
}

/* Statistics Section (mejorada) */
#stats {
text-align: center;
}

#stats .stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 20px;
margin-top: 30px;
}

.stat-card {
background: var(--color-fondo-secundario);
padding: 25px;
border-radius: 12px;
box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
border: 1px solid var(--color-borde-card);
text-align: center;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}

.stat-card i {
font-size: 36px;
color: var(--color-primario);
margin-bottom: 15px;
}

.stat-card .value {
font-size: 38px;
font-weight: 900;
color: var(--color-texto-claro);
margin-bottom: 5px;
}

.stat-card .label {
font-size: 16px;
color: var(--color-texto-gris);
text-transform: uppercase;
letter-spacing: 0.5px;
}

.stat-card.online-users .value {
color: var(--color-exito); /* Verde para usuarios online */
}

#last-update {
text-align: center;
font-size: 16px;
color: var(--color-texto-gris);
padding-top: 30px;
