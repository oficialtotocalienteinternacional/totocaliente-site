<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOTO CALIENTE INTERNACIONAL | Portal Oficial de la Comunidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           VARIABLES Y CONFIGURACIÓN BASE
           ========================================================================== */
        :root {
            --bg-principal: #0b0b0e;
            --bg-tarjeta: #141419;
            --bg-tarjeta-hover: #1c1c24;
            --primario: #ff4500;
            --primario-hover: #ff6324;
            --secundario: #0088cc;
            --secundario-hover: #00a2f3;
            --exito: #00e676;
            --texto-blanco: #ffffff;
            --texto-mutado: #a0a0b0;
            --borde: rgba(255, 69, 0, 0.15);
            --borde-hover: rgba(255, 69, 0, 0.4);
            --fuente: 'Montserrat', sans-serif;
            --transicion: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--fuente);
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 90% 10%, rgba(255, 69, 0, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 10% 80%, rgba(0, 136, 204, 0.06) 0%, transparent 45%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-principal); }
        ::-webkit-scrollbar-thumb { background: #252530; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primario); }

        .contenedor {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* BOTONES */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: var(--transicion);
            cursor: pointer;
            border: none;
        }

        .btn-primario {
            background: linear-gradient(135deg, var(--primario) 0%, #d42f00 100%);
            color: var(--texto-blanco);
            box-shadow: 0 4px 20px rgba(255, 69, 0, 0.3);
        }

        .btn-primario:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 69, 0, 0.5);
            background: linear-gradient(135deg, var(--primario-hover) 0%, var(--primario) 100%);
        }

        .btn-secundario {
            background: linear-gradient(135deg, var(--secundario) 0%, #006699 100%);
            color: var(--texto-blanco);
            box-shadow: 0 4px 20px rgba(0, 136, 204, 0.2);
        }

        .btn-secundario:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 136, 204, 0.4);
            background: linear-gradient(135deg, var(--secundario-hover) 0%, var(--secundario) 100%);
        }

        .btn-outline {
            background: transparent;
            color: var(--texto-blanco);
            border: 2px solid rgba(255,255,255,0.15);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--texto-blanco);
            transform: translateY(-2px);
        }

        .seccion-titulo {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
        }

        .seccion-titulo span { color: var(--primario); }
        .seccion-subtitulo { color: var(--texto-mutated); font-size: 1rem; margin-bottom: 40px; max-width: 600px; }

        .tarjeta {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 20px;
            padding: 30px;
            transition: var(--transicion);
            position: relative;
            overflow: hidden;
        }

        .tarjeta:hover {
            transform: translateY(-5px);
            border-color: var(--borde-hover);
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.05);
        }

        .badge-estado {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 230, 118, 0.1);
            color: var(--exito);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-estado .punto {
            width: 8px; height: 8px; background-color: var(--exito); border-radius: 50%;
            animation: pulso 2s infinite;
        }

        @keyframes pulso {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(0, 230, 118, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }

        /* HEADER */
        header {
            background-color: rgba(11, 11, 14, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 100; padding: 15px 0;
        }

        header .contenedor { display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--texto-blanco); }
        .brand-logo
